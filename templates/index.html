<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Emotion Detector</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script>
        function runAnalysis() {
            let textToAnalyze = document.getElementById("textToAnalyze").value;
            let xhr = new XMLHttpRequest();
            xhr.onreadystatechange = function() {
                if (xhr.readyState == 4 && xhr.status == 200) {
                    document.getElementById("system_response").innerHTML = xhr.responseText;
                }
            };
            xhr.open("GET", "/emotionDetector?textToAnalyze=" + encodeURIComponent(textToAnalyze), true);
            xhr.send();
        }
    </script>
</head>
<body class="bg-light">
    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="card shadow">
                    <div class="card-header bg-primary text-white text-center">
                        <h2>Emotion Detector Application</h2>
                    </div>
                    <div class="card-body">
                        <div class="mb-3">
                            <label for="textToAnalyze" class="form-label font-weight-bold">Enter the text you want to analyze:</label>
                            <textarea class="form-control" id="textToAnalyze" rows="4" placeholder="Type something here..."></textarea>
                        </div>
                        <div class="text-center mb-4">
                            <button class="btn btn-success btn-lg" onclick="runAnalysis()">Analyze Text</button>
                        </div>
                        <div class="p-3 bg-white border rounded">
                            <h5>System Response:</h5>
                            <div id="system_response" class="text-secondary mt-2">The analysis output will appear here.</div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
